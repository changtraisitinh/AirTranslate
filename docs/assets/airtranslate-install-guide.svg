<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AirTranslate install guide</title>
  <desc id="desc">Three-step installation guide for AirTranslate DMG releases on macOS.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef5f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="122" font-family="Noto Sans KR, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" fill="#111827">Install AirTranslate on macOS</text>
  <text x="120" y="175" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" fill="#4b5563">This pre-notarization DMG is for public testing. Use right-click Open on first launch.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="250" width="395" height="470" rx="28" fill="#ffffff"/>
    <rect x="603" y="250" width="395" height="470" rx="28" fill="#ffffff"/>
    <rect x="1085" y="250" width="395" height="470" rx="28" fill="#ffffff"/>
  </g>

  <circle cx="178" cy="312" r="34" fill="#2563eb"/>
  <text x="168" y="323" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#ffffff">1</text>
  <text x="230" y="323" font-family="Noto Sans KR, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="31" font-weight="800" fill="#111827">Download DMG</text>
  <rect x="180" y="390" width="275" height="178" rx="24" fill="#e8f0ff"/>
  <rect x="221" y="430" width="193" height="98" rx="16" fill="#ffffff" stroke="#93b4ff" stroke-width="3"/>
  <path d="M318 388v84m0 0-35-35m35 35 35-35" stroke="#2563eb" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="180" y="628" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">Download</text>
  <text x="180" y="665" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700" fill="#111827">AirTranslate.dmg</text>
  <text x="382" y="665" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">from GitHub Releases.</text>

  <circle cx="661" cy="312" r="34" fill="#0f766e"/>
  <text x="651" y="323" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#ffffff">2</text>
  <text x="713" y="323" font-family="Noto Sans KR, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="31" font-weight="800" fill="#111827">Drag To Apps</text>
  <rect x="663" y="390" width="275" height="178" rx="24" fill="#e7f7f4"/>
  <rect x="696" y="424" width="86" height="86" rx="20" fill="#111827"/>
  <text x="725" y="479" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="900" fill="#ffffff">A</text>
  <path d="M809 468h78m0 0-28-28m28 28-28 28" stroke="#0f766e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="689" y="536" width="220" height="48" rx="14" fill="#ffffff" stroke="#99d6cc" stroke-width="3"/>
  <text x="716" y="568" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#0f766e">Applications</text>
  <text x="663" y="628" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">Open the DMG and drag</text>
  <text x="663" y="665" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700" fill="#111827">AirTranslate.app</text>
  <text x="663" y="702" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">to Applications.</text>

  <circle cx="1143" cy="312" r="34" fill="#c2410c"/>
  <text x="1133" y="323" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#ffffff">3</text>
  <text x="1195" y="323" font-family="Noto Sans KR, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="31" font-weight="800" fill="#111827">Right-Click Open</text>
  <rect x="1145" y="390" width="275" height="178" rx="24" fill="#fff2e8"/>
  <rect x="1193" y="421" width="180" height="116" rx="18" fill="#ffffff" stroke="#f2b088" stroke-width="3"/>
  <path d="M1232 462h102M1232 499h76" stroke="#c2410c" stroke-width="12" stroke-linecap="round"/>
  <circle cx="1367" cy="421" r="27" fill="#c2410c"/>
  <text x="1357" y="431" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#ffffff">⌃</text>
  <text x="1145" y="628" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">First launch:</text>
  <text x="1145" y="665" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="700" fill="#111827">right-click → Open</text>
  <text x="1145" y="702" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" fill="#374151">then confirm Open again.</text>

  <rect x="120" y="790" width="1360" height="54" rx="20" fill="#111827"/>
  <text x="154" y="826" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" fill="#ffffff">Tip: Verify the DMG with SHA256. Developer ID signing and notarization will come in the next distribution step.</text>
</svg>
